
<!DOCTYPE html>
<html lang="en">
<head>
  <title>BBH</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
</head>

<style>
html, body {
  width: 100;
  height: 100%;
}
body { 
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
}

  width: 100%;

  image-rendering: pixelated;
}
</style>

<body>
  <canvas id="canvas"></canvas>
</body>

<script src="https://nxrix.github.io/assets/js/three.min.js"></script>
<script>

const vs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
void main() {
  vP = position;
  vN = normal;
  vW = (modelMatrix*vec4(position,1)).xyz;
  gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1);
}`;

const fs = `
varying vec3 vP;
varying vec3 vW;
varying vec3 vN;
uniform sampler2D iChannel0;
uniform float iTime;

// Copyright nxrix, 2026

vec2 sphere(vec3 ro, vec3 rd, vec3 p, float r) {
    vec3 oc = ro-p;
    float b = dot(oc,rd);
    float c = dot(oc,oc)-r*r;
    float h = b*b-c;
    if (h<0.0) return vec2(16,-16);
    h = sqrt(h);
    return vec2(-b-h,-b+h);
}

vec2 box(vec3 ro, vec3 rd, vec3 s) {
    vec3 m = 1.0/rd;
    vec3 n = m*ro;
    vec3 k = abs(m)*s;
    vec3 t1 = -n-k;
    vec3 t2 = -n+k;
    return vec2(
        max(max(t1.x,t1.y),t1.z),
        min(min(t2.x,t2.y),t2.z)
    );
}

const float  PI = 3.14159265;
const float TAU = 6.28318530;

//#define AA 2
//#define bloom
#define doppler
//#define jets
//#define RK4

const int MAX_STEPS = 128;
const float MIN_STEP = 1.0;
const float MAX_STEP = 16.0;

const float Rs1 = 2.0;
const float Rs2 = 1.0;

const float DISK1_INNER_RADIUS = Rs1 * 3.5;
const float DISK1_OUTER_RADIUS = Rs1 * 9.5;
const float DISK2_INNER_RADIUS = Rs2 * 3.5;
const float DISK2_OUTER_RADIUS = Rs2 * 9.5;

const vec3 BH1_POS = vec3(-27,0,0);
const vec3 BH2_POS = vec3( 32,0,0);

const vec3 DISK1_AXIS = normalize(vec3(0,10,5));
const vec3 DISK2_AXIS = normalize(vec3(0,10,-3));

const vec3 DISK1_U = normalize(cross(abs(DISK1_AXIS.y) < 0.99 ? vec3(0,1,0) : vec3(1,0,0), DISK1_AXIS));
const vec3 DISK1_V = cross(DISK1_AXIS, DISK1_U);

const vec3 DISK2_U = normalize(cross(abs(DISK2_AXIS.y) < 0.99 ? vec3(0,1,0) : vec3(1,0,0), DISK2_AXIS));
const vec3 DISK2_V = cross(DISK2_AXIS, DISK2_U);

const float INV_PI = 1.0 / PI;
const float INV_SIX_RS1 = 1.0 / (6.0 * Rs1);
const float INV_SIX_RS2 = 1.0 / (6.0 * Rs2);
const float DISK1_RANGE = DISK1_OUTER_RADIUS - DISK1_INNER_RADIUS;
const float DISK2_RANGE = DISK2_OUTER_RADIUS - DISK2_INNER_RADIUS;

float ls(float x) {
    return 1.0 - abs(mod(x * INV_PI, 2.0) - 1.0) * 2.0;
}

float hash(in vec2 s) {
    vec3 p = fract(vec3(s.xyx)*443.8975);
    p += dot(p,p.yzx+19.19);
    return fract((p.x+p.y)*p.z);
}

float noise(vec2 p) {
  //return hash(p);
  return texture2D(iChannel0,p/128.0).r+
  (texture2D(iChannel0,p/64.0).r-0.5)*0.5+
  (texture2D(iChannel0,p/32.0).r-0.5)*0.25+
  (texture2D(iChannel0,p/16.0).r-0.5)*0.25;
}

#ifdef doppler
vec3 disk(float t,float a,float d) {
  float n = noise(vec2((t-iTime*0.01)*20.0,ls(a+iTime*0.5)*3.0))*2.0-1.0;
  float t_noise = clamp(t*(1.0-n)+n,0.0,1.0);
  float d_factor = -d*0.1+1.1;
  float hv = pow(t*t*(1.0-t)*6.75,0.25);
  float t_adjusted = t_noise*1.5/(t_noise*d_factor+0.5)*hv;
  float t_factor = t_adjusted*0.5+0.5*hv;
  float t_half = t_adjusted*0.5+0.4*hv;
  float t_pow5 = exp(5.0*log(t_adjusted));
  float t_pow20 = exp(20.0*log(t_adjusted));
  return mix(vec3(t_half,t_pow5*0.6,t_pow20*0.3)*t_factor,vec3(t,0,0),clamp(1.0-t,0.0,1.0));
}
#else
vec3 disk(float t,float a) {
    float n = noise(vec2((t-iTime*0.01)*20.0,ls(a+iTime*0.5)*3.0))*2.0-1.0;
    float t_noise = clamp(t*(1.0-n)+n,0.0,1.0);
    float t_adjusted = t_noise*1.5/(t_noise+0.5);
    float t_factor = t_adjusted*0.5+0.5;
    float t_half = t_adjusted*0.5+0.4;
    float t_pow5 = exp(5.0*log(t_adjusted));
    float t_pow20 = exp(20.0*log(t_adjusted));
    //return vec3(t_half, t_pow5*0.6, t_pow20*0.3) * t_factor;
    return mix(vec3(t_half,t_pow5*0.6,t_pow20*0.3)*t_factor,vec3(t,0,0),clamp(1.0-t,0.0,1.0));
}
#endif

// d²λ / dx² = −2 r⁻⁵ Rₛ ( L × ( r × L ) )
vec3 bend(vec3 ro, vec3 rd, vec3 p, float rs) {
    vec3 r = ro - p;
    float r2 = dot(r,r);
    float r1 = inversesqrt(r2);
    vec3 L = cross(r, rd);
    //cross(axis,r)*spin*rs*3.0*r1/r2;
    return -1.5*rs*(r*dot(L,L)/*-L*dot(L,r)*/)*(r1/(r2*r2));//*pow(r1,5.0)
}

#ifdef RK4
void advance(inout vec3 ro, inout vec3 rd, float h) {
    vec3 k1_v = bend(ro, rd, BH1_POS, Rs1) + bend(ro, rd, BH2_POS, Rs2);
    vec3 k1_p = rd;
    vec3 k2_v = bend(ro + k1_p * h * 0.5, normalize(rd + k1_v * h * 0.5), BH1_POS, Rs1) + bend(ro + k1_p * h * 0.5, normalize(rd + k1_v * h * 0.5), BH2_POS, Rs2);
    vec3 k2_p = normalize(rd + k1_v * h * 0.5);
    vec3 k3_v = bend(ro + k2_p * h * 0.5, normalize(rd + k2_v * h * 0.5), BH1_POS, Rs1) + bend(ro + k2_p * h * 0.5, normalize(rd + k2_v * h * 0.5), BH2_POS, Rs2);
    vec3 k3_p = normalize(rd + k2_v * h * 0.5);
    vec3 k4_v = bend(ro + k3_p * h, normalize(rd + k3_v * h), BH1_POS, Rs1) + bend(ro + k3_p * h, normalize(rd + k3_v * h), BH2_POS, Rs2);
    vec3 k4_p = normalize(rd + k3_v * h);
    vec3 v_new = rd + (k1_v + 2.0*k2_v + 2.0*k3_v + k4_v) * h / 6.0;
    ro = ro + (k1_p + 2.0*k2_p + 2.0*k3_p + k4_p) * h / 6.0;
    rd = normalize(v_new);
}
#else
void advance(inout vec3 o, inout vec3 d, float h) {
    vec3 acc = bend(o,d,BH1_POS,Rs1)+bend(o,d,BH2_POS,Rs2);
    d = normalize(d+acc*h);
    o += d*h;
}
#endif

bool hit_disk(vec3 oro, vec3 ro, vec3 rd, vec3 center, vec3 axis, vec3 u, vec3 v, float innerR, float outerR, float angleOffset, inout vec3 col){
    float s1 = dot(oro - center, axis);
    float s2 = dot(ro  - center, axis);
    if (s1 * s2 >= 0.0) return false;
    float t = s1 / (s1 - s2);
    if (t < 0.0 || t > 1.0) return false;
    vec3 p = mix(oro, ro, t);
    vec3 rel = p - center;
    vec3 radial = rel - axis * dot(rel, axis);
    float r = length(radial);
    if (r < innerR || r > outerR) return false;
    float x = dot(radial, u);
    float y = dot(radial, v);
    float angle = atan(y, x) + angleOffset;
    float temp = 1.0 - (r - innerR) / (outerR - innerR);

    #ifdef doppler
    vec3 rl = normalize(radial);
    vec3 tg = normalize(cross(axis, rl));
    float dop = dot(tg, rd);
    col = disk(temp, angle, dop) * 1.2;
    #else
    col = disk(temp, angle) * 1.2;
    #endif

    return true;
}

bool hit_disk0(vec3 oro, vec3 ro, vec3 rd, vec3 center, float innerR, float outerR, float angleOffset, inout vec3 col){
    float s1 = oro.y;
    float s2 = ro.y;
    if (s1 * s2 >= 0.0) return false;
    float t = s1 / (s1 - s2);
    if (t < 0.0 || t > 1.0) return false;
    vec3 p = mix(oro, ro, t);
    vec3 rel = p - center;
    float r = length(rel.xz);
    if (r < innerR || r > outerR) return false;
    float angle = atan(rel.z,rel.x) + angleOffset;
    float temp = 1.0 - (r - innerR) / (outerR - innerR);

    #ifdef doppler
    vec3 rl = normalize(vec3(rel.x,0,rel.z));
    vec3 tg = -(vec3(-rl.z,0,rl.x));
    float dop = dot(tg,rd);
    col = disk(temp, angle, dop) * 1.2;
    #else
    col = disk(temp, angle) * 1.2;
    #endif

    return true;
}

#ifdef jets
//https://www.shadertoy.com/view/Dt3GzN
vec4 hypIntersect(vec3 ro, vec3 rd, vec3 ce, vec3 ra, float th) {
    vec3 oc = ro - ce;
    vec3 r2 = abs(ra)*ra;
    float a = dot(rd, rd/r2);
    float b = dot(oc, rd/r2);
    float c = dot(oc, oc/r2) - abs(th)*th;
    float h = b*b - a*c;
    if(h<0.) return vec4(-1);
    float t = (-b - sqrt(h))/a;
    vec3 n = normalize((oc + rd*t)/r2);
    return vec4(t, n);
}

bool hit_jet(vec3 oro, vec3 ro, vec3 rd, vec3 center, vec3 axis, vec3 u, vec3 v, float rs, inout vec3 col) {
    float segment_len = length(ro - oro);
    vec4 hit = hypIntersect(oro,rd,center,vec3(0.5,-3.0,0.5),-rs+0.5);
    if (hit.x>0.0&&hit.x<segment_len) {
        vec3 p_hit = ro+rd*hit.x;
        float h = abs(dot(p_hit-center,axis))/(32.0*rs);
        vec3 radial = normalize(hit.yzw-axis*dot(hit.yzw,axis));
        float a = ls(atan(dot(radial,v),dot(radial,u))+iTime);
        float n = noise(vec2(a*2.0+h*16.0-iTime,a));
        n += (1.0-n)*noise(vec2(-a*2.0+h*16.0-iTime,a));
        n = pow(n,8.0);
        col = clamp(vec3(n,n,n*2.5)*0.5,0.0,1.0)*(1.0-h);
        return true;
    }
    return false;
}
#endif

const vec3 box_size = vec3(95,45,45);
vec3 trace(vec3 ro, vec3 rd) {
    vec3 col = vec3(0);
    for (int i = 0; i < MAX_STEPS; i++) {
        float r1 = length(ro-BH1_POS);
        float r2 = length(ro-BH2_POS);
        if (r1 < Rs1 || r2 < Rs2 || (r1 > 80.0 && r2 > 80.0) ) {
            //return vec3(0);
            //return col;
            break;
        }

        vec3 oro = ro;
        float h = clamp(min(r1*INV_SIX_RS1,r2*INV_SIX_RS2),MIN_STEP,MAX_STEP);
        advance(ro,rd,h);

        vec3 col1;
        #ifdef jets
        if (hit_jet(oro,ro,rd,BH1_POS,DISK1_AXIS,DISK1_U,DISK1_V,Rs1,col1)) {
            col += col1*(1.0-col);
            //return col+col1;
        }
        if (hit_jet(oro,ro,rd,BH2_POS,DISK2_AXIS,DISK2_U,DISK2_V,Rs2,col1)) {
            col += col1*(1.0-col);
            //return col+col1;
        }
        #endif
        if (hit_disk(oro,ro,rd,BH1_POS,DISK1_AXIS,DISK1_U,DISK1_V,DISK1_INNER_RADIUS,DISK1_OUTER_RADIUS, 0.0,col1)) {
            col += col1*(1.0-col);
            //return col+col1;
        }
        if (hit_disk(oro,ro,rd,BH2_POS,DISK2_AXIS,DISK2_U,DISK2_V,DISK2_INNER_RADIUS,DISK2_OUTER_RADIUS,-1.5,col1)) {
            col += (col1.zyx+col1.x*vec3(0.3,0.2,0.2))*(1.0-col);
            //return col+col1.x*vec3(0.3,0.2,0.2);
        }
        /*if (hit_disk0(oro,ro,rd,BH1_POS,DISK1_INNER_RADIUS,DISK1_OUTER_RADIUS, 0.0,col1)) {
            col += col1*(1.0-col);
            //return col+col1;
        }
        if (hit_disk0(oro,ro,rd,BH2_POS,DISK2_INNER_RADIUS,DISK2_OUTER_RADIUS,-1.5,col1)) {
            col += (col1.zyx+col1.x*vec3(0.3,0.2,0.2))*(1.0-col);
            //return col+col1.x*vec3(0.3,0.2,0.2);
        }*/
    }
    return col;
}

vec3 render() {
    vec3 ro = cameraPosition;
    vec3 rd = normalize(vW-ro);
    vec3 id = 1.0/rd;
    vec3 t0 = (-box_size-ro)*id;
    vec3 t1 = ( box_size-ro)*id;
    vec3 tmin = min(t0,t1);
    vec3 tmax = max(t0,t1);
    float tn = max(max(tmin.x,tmin.y),tmin.z);
    float tf = min(min(tmax.x,tmax.y),tmax.z);
    if (tn>tf||tf<0.0) {
        return vec3(0);
    }
    ro += rd*(max(tn,0.0)+0.01);
    return trace(ro,rd);
}

void main() {
  gl_FragColor = vec4(render(),1);
}`;

const renderer = new THREE.WebGLRenderer({canvas,context:canvas.getContext("webgl",{antialias:false,preserveDrawingBuffer:true})});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputColorSpace  = THREE.LinearSRGBColorSpace;
const camera = new THREE.PerspectiveCamera(90,window.innerWidth/window.innerHeight,0.125,256);
const scene = new THREE.Scene();

camera.resize = () => {
  renderer.setSize(window.innerWidth,window.innerHeight);
  //renderer.setSize(window.innerWidth,window.innerWidth*0.5,false);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.zoom = camera.aspect<=1?camera.aspect:1;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize",camera.resize);
camera.resize();

camera.position.set(0,10,90);

const noiseSize = 256;
const noiseData = new Uint8Array(noiseSize * noiseSize);

for (let i = 0; i < noiseData.length; i++) {
  noiseData[i] = Math.random() * 255;
}

const noiseTexture = new THREE.DataTexture(
  noiseData,
  noiseSize,
  noiseSize,
  THREE.LuminanceFormat
);

noiseTexture.needsUpdate = true;
noiseTexture.wrapS = THREE.RepeatWrapping;
noiseTexture.wrapT = THREE.RepeatWrapping;
//noiseTexture.minFilter = THREE.NearestFilter;
//noiseTexture.magFilter = THREE.NearestFilter;
noiseTexture.minFilter = THREE.LinearFilter;
noiseTexture.magFilter = THREE.LinearFilter;


const material = new THREE.ShaderMaterial({
  vertexShader: vs,
  fragmentShader: fs,
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    iChannel0: { value: noiseTexture },
    iTime: { value: 0 }
  }
});
const geometry = new THREE.BoxGeometry(95,45,45);
const cube = new THREE.Mesh(geometry,material);
cube.position.set(0,0,0);
scene.add(cube);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
const update = (time) => {
  material.uniforms.iTime.value = time*0.001;
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(update);
}
update(0);

</script>
